name: Node.js CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      # Adding the flag ensures the CI doesn't crash on peer-dep conflicts
      run: npm install --legacy-peer-deps
        
      
    - name: Run Linter
      run: npx eslint . || echo "Linter found issues"

    - name: Run Automated Tests
      run: npm test